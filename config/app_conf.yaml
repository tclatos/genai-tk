# GenAI Toolkit Configuration
# Basic configuration for running tests, Agents and CLI commands

# Default configuration, as defined in baseline.yaml, overrides.yaml (here), or elsewhere.
# It can be overidden by 'BLUEPRINT_CONFIG' environment variable, or in code

default_config: ${oc.env:BLUEPRINT_CONFIG,baseline}

:merge:
  - ${paths.config}/baseline.yaml
  - ${paths.config}/providers/llm.yaml
  - ${paths.config}/providers/embeddings.yaml
  - ${paths.config}/overrides.yaml
  - ${paths.config}/mcp_servers.yaml
  - ${paths.config}/webapp.yaml
  # Agent configs are loaded on-demand by their respective loaders
  # (load_deepagent_config, load_deer_flow_profiles, load_unified_config,
  # load_all_demos_from_config) — no need to merge them globally here.
 
:env:
  LOGURU_LEVEL: INFO
  LANGCHAIN_TRACING_V2: "false"  # Disable LangChain v2 tracing by default (can be enabled in overrides or env)
  DEER_FLOW_PATH: ${oc.env:DEER_FLOW_PATH,${paths.project}/ext/deer-flow}

paths:
  home: ${oc.env:HOME}
  project: ${oc.env:PWD}
  config: ${paths.project}/config
  data_root: ${paths.project}/data

# Test suite configuration
# Paths are relative to the project root; absent keys fall back to common defaults.
test:
  unit: tests/unit_tests
  integration: tests/integration_tests
  evals: tests/eval_tests
  notebooks: notebooks



# Command Line Interface configuration
cli:
  commands:  # List modules.functions or modules.classes to register CLI commands
    - genai_tk.core.commands_core.CoreCommands
    - genai_tk.core.commands_info.InfoCommands
    - genai_tk.core.commands_test.TestCommands
    - genai_tk.extra.commands_extra.ExtraCommands
    - genai_tk.agents.commands_agents.AgentCommands
    - genai_tk.agents.sandbox.cli_commands.SandboxCommands
    - genai_tk.extra.structured.commands_baml.BamlCommands
    - genai_tk.extra.rag.commands_rag.RagCommands
    - genai_tk.mcp.cli_commands.McpCommands
    - genai_tk.main.cli.register_commands
