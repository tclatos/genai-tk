# Local profile defaults — loaded when GENAITK_PROFILE=local (the default).
# Override paths below to match your local environment.
#
# paths:
#   data_root: /my/custom/data        # where caches, vector stores, etc. are stored
#   models: /my/custom/models         # local model files

llm:
  models:
    default: gpt_oss120@openrouter
    fake: parrot_local@fake 
    safe_llm: mistral-small@edenai
    
    cheap_model: claude-haiku@openrouter
    fast_model: claude-haiku@openrouter
  cache: sqlite
  cache_path: data/llm_cache/langchain.db

embeddings:
  models:
    default: qwen3_06b@deepinfra
    local: artic_22@ollama
    fake: embeddings_768@fake  # For testing
  cache: data/hf_models

# OLD configuration - still used by some code
vector_store:
  default: InMemory


# ============================================================
# PostgreSQL connection sources  (get_pg_engine / get_postgres_url)
# See: genai_tk.core.vector_backends.pgvector
# ============================================================
postgres:
  default:
    mode: external
    url: postgresql+asyncpg://${oc.env:POSTGRES_USER,postgres}:${oc.env:POSTGRES_PASSWORD,password}@localhost:5432/genai

  # Embedded PostgreSQL via pgembed — no server setup required
  # embedded:
  #   mode: pgembed
  #   data_dir: ${paths.data_root}/pgembed
  #   extensions: [vector]


# Key-Value Stores configuration
kv_store: 
  default:
    type: LocalFileStore
    path: ${paths.data_root}/kv_store
    
  postgres: 
    type: SQLStore
    path: postgresql://${oc.env:POSTGRES_USER,unknown_user}:${oc.env:POSTGRES_PASSWORD,password}@localhost:5432/ekg
  
# LLM Cache configuration  
llm_cache:
  method: "memory"  # Use memory cache for tests

chains:   # Old stuff. Will likely be removed
  root: tests.chains
  modules:
    - ${..root}.joke 

structured:
  default:
    baml_client: tests.baml_client

monitoring: 
  langsmith : true
  project: GenAI_demo