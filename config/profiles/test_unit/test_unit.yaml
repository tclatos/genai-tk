# Test-unit profile — loaded when GENAITK_PROFILE=test_unit
# Provides test_env and prod_env as use_context() targets for config manager tests.

test_env:
  llm:
    models:
      default: gpt-3.5-turbo
    max_tokens: 1000
    temperature: 0.7
  features:
    enable_caching: true
    enable_logging: false
  db:
    host: localhost
    port: 5432
    name: test_db
  cli:
    commands:
      - test.module:register_commands
      - test.module2:register_commands
  ui:
    app_name: Test App
    pages_dir: /tmp/pages

prod_env:
  llm:
    models:
      default: gpt-4
    max_tokens: 2000
    temperature: 0.1
  features:
    enable_caching: true
    enable_logging: true
  db:
    host: prod.example.com
    port: 5432
    name: prod_db
