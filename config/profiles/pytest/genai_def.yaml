# Pytest profile defaults — loaded when GENAITK_PROFILE=pytest.
# Override paths below if your test data lives somewhere specific.
#
# paths:
#   data_root: /tmp/genai_test_data    # isolated data dir for test runs
#   models: /tmp/test_models

llm:
  models:
    default: parrot_local@fake
    fake: parrot_local@fake
    test: claude-haiku@openrouter
    cheap_model: claude-haiku@openrouter
    fast_model: claude-haiku@openrouter

embeddings:
  models:
    default: embeddings_768@fake
    fake: embeddings_768@fake
    test: ada-002@openai
  cache: data/hf_models

kv_store:
  engine: memory

llm_cache:
  method: memory

logging:
  level: INFO

vector_store:
  postgres_url: null
