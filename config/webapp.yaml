# Web application configuration
# Copied to ./config/ by `cli init` — customise here for your project.

ui:
  # Browser tab title and sidebar header.  Defaults to the project directory name.
  app_name: Browser control

  # Path to your logo image (relative to the working directory, or absolute).
  # Leave as null to show no logo.
  logo: null

  pages_dir: ${paths.project}/browser_control/webapp/pages
  navigation:
    demos:
      - demos/hello_agent.py
