
# A simple baseline configuration 
llm:
  models:
    default: gpt_oss120@openrouter
    fake: parrot_local@fake 
    safe_llm: mistral-small@edenai
    
    cheap_model: claude-haiku@openrouter
    fast_model: claude-haiku@openrouter
  cache: sqlite
  cache_path: data/llm_cache/langchain.db

embeddings:
  models:
    default: ada_002@openai
    local: artic_22@ollama
    fake: embeddings_768@fake  # For testing
  cache: data/hf_models

# OLD configuration - still used by some code
vector_store:
  default: InMemory
  
embeddings_store:
  # Updated configuration using new field names (backend instead of id, storage instead of chroma_path)
 
  # default:
  #   backend: Chroma
  #   embeddings: default
  #   config:
  #     storage: ${paths.data_root}/vector_store  # Persistent storage on disk
  
  in_memory:
    backend: InMemory
  
  in_memory_chroma: &default_store  # Anchor is defined here first
    backend: Chroma
    embeddings: default
    table_name_prefix: embeddings
    config:
      storage: '::memory::'  # In-memory Chroma storage

  local_fast:
    backend: Chroma
    embeddings: bge-small-en@local
    table_name_prefix: embeddings
    config:
      storage: ${paths.data_root}/vector_store_local_fast  # Persistent local FastEmbed-backed store
  
  default: *default_store  # Now we can reference it
  
  chroma_indexed:
    backend: Chroma
    embeddings: default
    table_name_prefix: embeddings
    config:
      storage: ${paths.data_root}/vector_store  # Persistent storage on disk


# ============================================================
# Retrievers — composable RAG retrievers (RetrieverFactory)
# See: genai_tk.core.retriever_factory
# ============================================================
retrievers:
  # Simple in-memory vector retriever (good for tests/demos)
  default:
    type: vector
    embeddings_store: in_memory_chroma
    top_k: 4

  # Persistent Chroma vector retriever with record_manager dedup
  persistent:
    type: vector
    embeddings_store: chroma_indexed
    top_k: 4
    # record_manager_url: auto-generated SQLite under ${paths.data_root}/record_manager/

  # BM25 retriever (index persisted under ${paths.data_root}/bm25_cache/bm25_local/)
  bm25_local:
    type: bm25
    k: 4
    preprocessing: default   # or "spacy" for lemmatisation

  # Ensemble: dense + sparse (good baseline for hybrid retrieval without Postgres)
  hybrid_ensemble:
    type: ensemble
    retrievers:
      - ref: default
        weight: 0.7
      - ref: bm25_local
        weight: 0.3

  # Reranked ensemble using semantic embeddings filter
  hybrid_reranked:
    type: reranked
    retriever: hybrid_ensemble
    reranker: embeddings   # or "cohere" / "cross_encoder"
    top_k: 3
    fetch_k: 10

  # PostgreSQL hybrid search (requires postgres dependency group)
  # pg_hybrid:
  #   type: pg_hybrid
  #   embeddings: default
  #   postgres: default
  #   hybrid_search: true
  #   top_k: 4
  #   hybrid_search_config:
  #     tsv_lang: pg_catalog.english
  #     fusion_function_parameters:
  #       primary_results_weight: 0.7
  #       secondary_results_weight: 0.3


# ============================================================
# PostgreSQL connection sources  (get_pg_engine / get_postgres_url)
# See: genai_tk.extra.postgres
# ============================================================
postgres:
  default:
    mode: external
    url: postgresql+asyncpg://${oc.env:POSTGRES_USER,postgres}:${oc.env:POSTGRES_PASSWORD,password}@localhost:5432/genai

  # Embedded PostgreSQL via pgembed — no server setup required
  # embedded:
  #   mode: pgembed
  #   data_dir: ${paths.data_root}/pgembed
  #   extensions: [vector]


# Key-Value Stores configuration
kv_store: 
  default:
    type: LocalFileStore
    path: ${paths.data_root}/kv_store
    
  postgres: 
    type: SQLStore
    path: postgresql://${oc.env:POSTGRES_USER,unknown_user}:${oc.env:POSTGRES_PASSWORD,password}@localhost:5432/ekg
  
# LLM Cache configuration  
llm_cache:
  method: "memory"  # Use memory cache for tests

chains:   # Old stuff. Will likely be removed
  root: tests.chains
  modules:
    - ${..root}.joke 

structured:
  default:
    baml_client: tests.baml_client

monitoring: 
  langsmith : true
  project: GenAI_demo