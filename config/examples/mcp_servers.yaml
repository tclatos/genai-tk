mcpServers:
  filesystem:
      command: npx
      args: 
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - ${paths.project}

  playwright:
    command: npx
    args: 
    - "@playwright/mcp@latest"
    - "--headless"

  playwright_ui:  # Does not seems to work in headed mode (in WSL...)
    command: npx
    args: 
    - "@playwright/mcp@latest"

  # @agent-infra/mcp-server-browser — Puppeteer-based MCP browser automation.
  # More stable than raw CDP (HTTP-wrapped), accessibility-tree navigation,
  # runtime UA override via headers.  Can target sandbox or host browser.
  browser_mcp:
    command: npx
    args:
    - "@agent-infra/mcp-server-browser@latest"
    - "--headless"
    description: "Puppeteer MCP browser (host-local, headless)"

  browser_mcp_headed:
    command: npx
    args:
    - "@agent-infra/mcp-server-browser@latest"
    description: "Puppeteer MCP browser (host-local, headed for visual debug)"

  # Connect to AIO sandbox browser via CDP endpoint
  browser_mcp_sandbox:
    command: npx
    args:
    - "@agent-infra/mcp-server-browser@latest"
    - "--cdp-endpoint"
    - "http://localhost:8080/cdp/json/version"
    - "--user-agent"
    - "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36"
    description: "Puppeteer MCP browser connected to AIO sandbox (fixes UA mismatch)"
    disabled: true

  tavily-mcp: 
    command: npx
    args: [ "-y" ,"tavily-mcp"]
    env: 
      TAVILY_API_KEY : ${oc.env:TAVILY_API_KEY,  "dummy key"}

  github:
    command: npx
    args:  ["-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${oc.env:GITHUB_TOKEN_, "dummy token"}
    disabled: true

  pubmed:
      command: uvx
      args: ["--quiet", "pubmedmcp@0.1.3"]
      description: Provides access to PubMed medical research database
      example : "Find relevant studies on alcohol hangover and treatment."
      disabled: true

# Project-defined MCP servers (served via `cli mcp serve --name <name>`).
# Each key is the server name declared in config/mcp/servers.yaml.
# Set disabled: true to exclude a server without removing it from this list.
mcpProjectServers:
  chinook: {}
  search:
    disabled: false
