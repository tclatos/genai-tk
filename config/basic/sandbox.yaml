# Unified Sandbox Configuration
#
# Defines all sandbox technologies available across agent frameworks.
# Each framework reads its settings from here instead of duplicating config.
#
# SANDBOX NAMES (used in --sandbox CLI flag and agent YAML configs):
#   local   — No sandbox. Code runs directly in the host process (default).
#   docker  — Docker-based isolation.
#              • 'aio' sub-config:  AioSandboxBackend (HTTP API container) —
#                used by LangChain deepagent, deepagent-cli, and Deer Flow.
#              • 'smolagents' sub-config: SmolAgents native Docker executor —
#                a separate image approach used only by SmolAgents.
#   e2b     — E2B cloud sandbox (SmolAgents only; LangChain E2B not released yet).
#   wasm    — WebAssembly / Pyodide via Deno (SmolAgents only, reserved slot).
#
# FRAMEWORK SUPPORT MATRIX:
#   Framework         local   docker   e2b   wasm
#   ─────────────────────────────────────────────
#   LangChain deep    ✓       ✓        –     –
#   deepagent-cli     ✓       ✓        –     –
#   Deer Flow         ✓       ✓        –     –
#   SmolAgents        ✓       ✓        ✓     ✓*
#   (* wasm: reserved, requires Deno install)

sandbox:
  default: local

  # ── Docker-based sandboxes ─────────────────────────────────────────────────
  docker:
    # AioSandboxBackend — HTTP REST API container backed by agent-infra/sandbox.
    # Used by: LangChain deepagent, deepagent-cli, Deer Flow.
    aio:
      image: "ghcr.io/agent-infra/sandbox:latest"
      startup_timeout: 60.0
      work_dir: "/home/user"
      env_vars: {}
      opensandbox_server_url: "http://localhost:8080"
      # entrypoint: ["/opt/gem/run.sh"]  # default matches ghcr.io/agent-infra/sandbox

    # SmolAgents native Docker executor — a lightweight container that runs
    # generated Python code snippets. Uses a different image and approach than
    # the AioSandboxBackend above.
    smolagents:
      image: "python:3.12-slim"
      mem_limit: "512m"
      cpu_quota: 50000
      pids_limit: 100

  # ── E2B cloud sandbox ──────────────────────────────────────────────────────
  # Supported by SmolAgents (executor_type="e2b").
  # LangChain deepagents E2B provider not yet released.
  e2b:
    api_key: ${E2B_API_KEY:null}
    template: null          # Optional custom E2B template ID
    timeout: 300            # Max execution time (seconds)

  # ── WebAssembly / Pyodide ──────────────────────────────────────────────────
  # SmolAgents executor_type="wasm" — requires Deno installed on the host.
  # Reserved config slot; no framework-specific settings needed beyond install.
  wasm:
    enabled: false

# ── Sandbox Browser Tools ──────────────────────────────────────────────────
# Settings for the agent-driven browser tools (genai_tk.tools.sandbox_browser).
# These tools connect to the AIO sandbox's Chromium via CDP and let a deep
# agent navigate websites, fill forms, and extract data.
sandbox_browser:
  locale: "fr-FR"
  timezone_id: "Europe/Paris"
  viewport_width: 1920
  viewport_height: 1080
  default_timeout_ms: 30000
  slow_type_ms: 60              # Human-like typing delay (ms per character)
  cookies_dir: "data/sessions"
  # Allowlist of environment variable names that browser_fill_credential can
  # access.  Prevents the LLM from exfiltrating arbitrary env vars.
  # An empty list means ALL env vars are allowed (less secure).
  allowed_credential_envs:
    - ENEDIS_USERNAME
    - ENEDIS_PASSWORD
    - SHAREPOINT_USERNAME
    - SHAREPOINT_PASSWORD
    - SAP_USERNAME
    - SAP_PASSWORD
