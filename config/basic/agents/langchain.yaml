# Unified LangChain Agents Configuration
#
# Covers react, deep, and custom agent types under one file.
# Profiles inherit from `defaults` and may override any field.
#
# Profile fields:
#   name:              Display name (used in --profile CLI option)
#   type:              Agent engine: react | deep | custom  (default: react)
#   description:       Short description for --list display
#   llm:               LLM identifier (ID like 'gpt_41mini@openai' or tag like 'fast_model').
#                      Null = use global default LLM.
#   system_prompt:     Full system instructions for the agent
#   pre_prompt:        Short context prepended to user query (react shorthand)
#   tools:             LangChain tools via factory/class/function patterns
#   mcp_servers:       MCP server names from config/mcp_servers.yaml
#   middlewares:       List of middleware (replaces defaults). Each entry has a
#                      'class: module:Class' key plus optional constructor kwargs.
#   checkpointer:      Checkpointer config (type: none | memory | class)
#   backend:           Backend config (type: none | aio_sandbox | class)
#                        none        – no backend (default)
#                        aio_sandbox – built-in Docker-based AioSandboxBackend.
#                                      Any AioSandboxBackendConfig field can be
#                                      set as a sibling key (host_port, work_dir,
#                                      startup_timeout, env_vars, …).
#                        class       – any deepagents BackendProtocol loaded via
#                                      qualified 'module:Class' path.
#                                      Pass constructor args under 'kwargs:'.
#                      Only meaningful for type: deep agents; ignored (with a
#                      warning) on react/custom profiles.
# Deep-agent-specific fields (type: deep only; warn if set on react/custom):
#   skill_directories: Directories containing SKILL.md files
#   enable_planning:   Enable write_todos planning tool [default: true]
#   enable_file_system: Enable file read/write/edit tools [default: true]
#   subagents:         Specialized sub-agents for task delegation
# UI / docs:
#   features:          Feature badges (displayed in --list)
#   examples:          Sample queries

langchain_agents:
  # --------------------------------------------------------------------------
  # Global defaults — inherited by all profiles unless overridden
  # --------------------------------------------------------------------------
  defaults:
    type: react
    llm: null  # null = use global default LLM from config
    middlewares:
      - class: genai_tk.agents.langchain.rich_middleware:RichToolCallMiddleware
    checkpointer:
      type: none  # chat mode always forces memory; use 'memory' to persist across invocations
    backend:
      type: none  # set to 'aio_sandbox' or 'class' in deep-agent profiles that need a backend
    enable_planning: true
    enable_file_system: true
    skills:
      directories:
        - ${paths.project}/skills
      trace_loading: true

  # --------------------------------------------------------------------------
  # Default profile (used when --profile is not specified)
  # --------------------------------------------------------------------------
  default_profile: "simple"

  # --------------------------------------------------------------------------
  # Agent profiles
  # --------------------------------------------------------------------------
  profiles:

    # ── React agents (lightweight, no planning / file system) ──────────────

    - name: "simple"
      type: react
      description: "Simple agents with web search"
      pre_prompt: "Yu are an agent having access to the Web."
      tools:
        - factory: genai_tk.tools.langchain.search_tools_factory:create_search_function
          verbose: true

    - name: "filesystem"
      type: react
      description: "File system manipulation agent"
      pre_prompt: "You have the ability to manipulate the file system. If the user asks something else, refuse politely."
      tools:
        - factory: genai_tk.tools.langchain.search_tools_factory:create_search_function
          verbose: true
      mcp_servers:
        - "filesystem"
      examples:
        - "What are the configuration files in current directory"

    - name: "Chinook"
      type: react
      description: "SQL agent for querying the Chinook music store database"
      tools:
        - factory: genai_tk.tools.langchain.sql_tool_factory:create_sql_tool_from_config
          config:
            database_uri: sqlite:///${paths.project}/tests/data/Chinook.sqlite
            tool_name: "query_chinook"
            tool_description: "Query the Chinook music database for information about artists, albums, tracks, customers, and invoices"
            examples:
              - input: "List all artists"
                query: "SELECT * FROM Artist LIMIT 10;"
              - input: "Find all albums for the artist 'AC/DC'"
                query: "SELECT * FROM Album WHERE ArtistId = (SELECT ArtistId FROM Artist WHERE Name = 'AC/DC');"
              - input: "List all tracks in the 'Rock' genre"
                query: "SELECT * FROM Track WHERE GenreId = (SELECT GenreId FROM Genre WHERE Name = 'Rock');"
              - input: "Find the total duration of all tracks"
                query: "SELECT SUM(Milliseconds) FROM Track;"
              - input: "Which country's customers spent the most?"
                query: "SELECT BillingCountry, SUM(Total) as TotalSpent FROM Invoice GROUP BY BillingCountry ORDER BY TotalSpent DESC LIMIT 1;"
            top_k: 15
      examples:
        - "List all artists in the database"
        - "Which country's customers spent the most?"
        - "Show me albums by AC/DC"
        - "How many tracks are in the Rock genre?"

    - name: "Weather"
      type: react
      description: "Weather assistant with web search"
      tools:
        - factory: genai_tk.tools.langchain.search_tools_factory:create_search_function
          verbose: true
      mcp_servers:
        - "filesystem"
      pre_prompt: "You are a helpful weather assistant. Always provide current weather information and be specific about locations and conditions."
      examples:
        - "What is the current weather in Toulouse?"
        - "Will it rain tomorrow in Paris?"

    # ── Deep agents (planning + file system + skills) ───────────────────────

    - name: "Research"
      type: deep
      description: "Expert researcher with web search, planning, and file system tools"
      # Backend options (uncomment one to enable a persistent file-system backend):
      #
      # Built-in Docker sandbox — starts ghcr.io/agent-infra/sandbox automatically:
      # backend:
      #   type: aio_sandbox
      #   host_port: 18091          # host port (default: 18091)
      #   startup_timeout: 90.0    # seconds to wait for the container API
      #   work_dir: /home/user     # default ls / grep directory
      #   env_vars:
      #     MY_VAR: "1"
      #
      # Custom deepagents BackendProtocol:
      # backend:
      #   type: class
      #   class: my_package.backends:MyBackend
      #   kwargs:
      #     some_option: value
      system_prompt: |
        You are an expert researcher. Your job is to conduct thorough research and write polished, well-formatted reports.

        IMPORTANT: Format ALL your responses using proper Markdown syntax:
        - Use # for main title, ## for major sections, ### for subsections
        - Use **bold** for emphasis and key terms
        - Use bullet points (- or *) for lists
        - Use numbered lists (1. 2. 3.) when order matters
        - Use > for important quotes or key insights
        - Use `code` for technical terms
        - Use --- for section dividers
        - Include tables using | syntax when comparing data
        - Add line breaks between sections for readability

        ## Research Process

        1. Use write_todos to plan your research approach
        2. Search for relevant information using available search tools
        3. Use write_file to save important findings as you go
        4. Analyze and synthesize the information
        5. Write a comprehensive, well-structured report

        ## Output Format

        Your response should follow this structure:

        # [Topic Title]

        ## Overview
        [Brief summary]

        ## Key Findings
        - Finding 1
        - Finding 2

        ## Details
        [Detailed information organized in sections]

        ## Sources
        - [Source 1](url)
        - [Source 2](url)

        Be thorough, objective, and always cite your sources.

      tools:
        - factory: genai_tk.tools.langchain.search_tools_factory:create_search_function

      mcp_servers:
        - tavily-mcp

      skill_directories:
        - ${paths.project}/skills

      enable_planning: true
      enable_file_system: true

      features:
        - "🔍 Web Search"
        - "📝 Planning"
        - "📁 File System"
        - "🧠 Deep Research"

      examples:
        - "Research the latest developments in quantum computing"
        - "Analyze the current state of renewable energy adoption worldwide"
        - "Investigate the impact of AI on healthcare industry"

    - name: "Coding"
      type: deep
      description: "Expert Python developer with file system tools, planning, and code execution"
      system_prompt: |
        You are an expert Python developer. Your job is to help with coding tasks including:

        1. Writing new code
        2. Debugging existing code
        3. Refactoring and optimization
        4. Writing tests
        5. Documentation

        ## Working Process

        1. Understand the requirements
        2. Use write_todos to plan the implementation
        3. Use write_file and edit_file to create and modify code
        4. Use read_file to examine existing code
        5. Test and debug as needed
        6. Document your work

        ## Python Standards

        Follow these Python coding standards:
        - Use type annotations whenever possible
        - Use '|' instead of 'Union', and '| None' instead of 'Optional'
        - Use Pydantic to define classes whenever possible
        - Avoid __init__ methods, use model_post_init() instead
        - Use Google style docstrings without mentioning types or exceptions
        - Use ``` to format code in documentation (Fenced Code Blocks)
        - Don't add comments for class fields and arguments
        - Follow PEP 8 style guidelines
        - Write clean, maintainable, and well-documented code

        Always ensure code quality and follow best practices.

      tools: []

      mcp_servers: []

      skill_directories:
        - ${paths.project}/skills

      enable_planning: true
      enable_file_system: true

      features:
        - "💻 Code Writing"
        - "🐛 Debugging"
        - "📝 Planning"
        - "📁 File System"

      examples:
        - "Write a Python function to calculate Fibonacci sequence"
        - "Debug this Python code for performance issues"
        - "Refactor this class to use Pydantic models"

    - name: "Data Analysis"
      type: deep
      description: "Expert data analyst with web search, file system, and planning tools"
      system_prompt: |
        You are an expert data analyst. Your job is to analyze data, find insights, and create reports.

        ## Analysis Process

        1. Use write_todos to plan the analysis approach
        2. Use read_file to load data files
        3. Perform exploratory data analysis
        4. Identify patterns and insights
        5. Use write_file to save visualizations and intermediate results
        6. Create visualizations if needed
        7. Write a comprehensive analysis report

        ## Python Standards for Data Analysis

        - Use type annotations whenever possible
        - Use '|' instead of 'Union', and '| None' instead of 'Optional'
        - Use Pydantic for configuration models
        - Use pandas, matplotlib, seaborn for analysis and visualization
        - Use Google style docstrings

        Use the file system tools to save intermediate results and final reports.
        Be thorough in your analysis and clearly communicate findings.

      tools:
        - factory: genai_tk.tools.langchain.search_tools_factory:create_search_function

      mcp_servers:
        - tavily-mcp

      skill_directories:
        - ${paths.project}/skills

      enable_planning: true
      enable_file_system: true

      features:
        - "📊 Data Analysis"
        - "📈 Visualization"
        - "🔍 Research"
        - "📁 File System"

      examples:
        - "Analyze this dataset and identify key trends"
        - "Create a comprehensive data analysis report"
        - "Find correlations and patterns in the provided data"

    - name: "Web Research"
      type: deep
      description: "Web researcher with browsing tools, MCP servers, and comprehensive research capabilities"
      system_prompt: |
        You are an expert web researcher specialized in gathering and analyzing information from the internet.

        Use your tools to:
        1. Plan your research strategy with write_todos
        2. Navigate to relevant websites
        3. Extract key information
        4. Save findings to files for later reference
        5. Cross-reference multiple sources
        6. Synthesize findings into comprehensive reports

        Always verify information from multiple sources and provide proper citations.
        Use the file system to organize your research notes and findings.

      tools:
        - factory: genai_tk.tools.langchain.search_tools_factory:create_search_function
        - factory: genai_tk.tools.langchain.search_tools_factory:create_webpage_tool

      mcp_servers:
        - playwright
        - tavily-mcp

      skill_directories:
        - ${paths.project}/skills

      enable_planning: true
      enable_file_system: true

      features:
        - "🌐 Web Browsing"
        - "🔍 Deep Search"
        - "📝 Planning"
        - "📁 Research Notes"

      examples:
        - "Research latest AI developments on tech company websites"
        - "Find information about quantum computing breakthroughs"
        - "Analyze market trends from financial news websites"

    - name: "Documentation Writer"
      type: deep
      description: "Technical documentation writer with web search, file system, and planning tools"
      system_prompt: |
        You are an expert technical documentation writer. Your job is to create clear, comprehensive, and well-structured documentation.

        ## Documentation Standards

        - Use clear, concise language
        - Structure content logically with proper headings
        - Include code examples where relevant
        - Use proper Markdown formatting
        - Create table of contents for longer documents
        - Include usage examples and best practices

        ## Python Documentation Standards

        - Use Google style docstrings
        - Don't mention types in docstrings (use type annotations instead)
        - Don't mention raised exceptions in docstrings
        - Use ``` to format code in documentation
        - Don't repeat code examples in module descriptions if already in function docstrings

        ## Working Process

        1. Use write_todos to plan the documentation structure
        2. Use read_file to examine code and existing documentation
        3. Research any unclear topics with web search
        4. Use write_file to create documentation files
        5. Use edit_file to refine and improve documentation

        Always ensure documentation is up-to-date, accurate, and helpful for users.

      tools:
        - factory: genai_tk.tools.langchain.search_tools_factory:create_search_function

      mcp_servers:
        - tavily-mcp

      skill_directories:
        - ${paths.project}/skills

      enable_planning: true
      enable_file_system: true

      features:
        - "📚 Documentation"
        - "💻 Code Examples"
        - "🔍 Research"
        - "📁 File Management"

      examples:
        - "Create API documentation for this Python module"
        - "Write user guide for this software project"
        - "Generate README file with installation and usage instructions"

    - name: "text2sql"
      type: deep
      description: "Text-to-SQL agent for querying the Chinook music store database with planning and schema-exploration skills"

      # Core agent identity — always present in every LLM call.
      # Task-specific workflows (query writing, schema exploration) are loaded
      # dynamically from SKILL.md files via progressive disclosure.
      system_prompt: |
        You are a Deep Agent designed to interact with a SQL database.

        Given a natural language question, you will:
        1. Explore the available database tables
        2. Examine relevant table schemas
        3. Generate syntactically correct SQL queries
        4. Execute queries and analyze results
        5. Format answers in a clear, readable way

        Always answer by querying the database — never from general knowledge.
        Only use SELECT — never INSERT, UPDATE, DELETE, DROP, ALTER, TRUNCATE, CREATE.
        Limit results to 5 rows unless the user specifies otherwise.
        For complex questions, use write_todos to plan your approach.

      tools:
        - factory: genai_tk.tools.langchain.sql_tool_factory:create_sql_toolkit_tools
          database_uri: sqlite:///${paths.project}/tests/data/Chinook.sqlite

      skill_directories:
        - ${paths.project}/skills/langchain example

      backend:
        type: filesystem
        root_dir: ${paths.project}

      enable_planning: true

      features:
        - "🗄️ SQL Queries"
        - "📝 Planning"
        - "🔍 Schema Exploration"

      examples:
        - "What are the best selling groups?"
        - "Which customer spent the most money?"
        - "List the top 5 genres by track count"
        - "Which employee generated the most revenue by country?"
        - "How many customers are from Canada?"

    - name: "Stock Analysis"
      type: deep
      description: "Financial analyst with stock data tools, web research, and reporting capabilities"
      system_prompt: |
        You are an expert financial analyst specialized in stock market analysis.

        Use available tools to:
        1. Plan your analysis approach with write_todos
        2. Gather current stock information
        3. Analyze historical price trends
        4. Research company fundamentals
        5. Save analysis data and charts to files
        6. Create comprehensive investment analysis reports

        Always provide data-driven insights with proper risk disclaimers.
        Use the file system to organize your analysis and maintain research notes.

      tools:
        - function: genai_tk.tools.smolagents.yfinance_tools:get_stock_info
        - function: genai_tk.tools.smolagents.yfinance_tools:get_historical_price
        - factory: genai_tk.tools.langchain.search_tools_factory:create_search_function
        - factory: genai_tk.tools.langchain.search_tools_factory:create_webpage_tool

      mcp_servers:
        - tavily-mcp

      skill_directories:
        - ${paths.project}/skills

      enable_planning: true
      enable_file_system: true

      features:
        - "📈 Stock Analysis"
        - "💰 Financial Research"
        - "📊 Data Visualization"
        - "📁 Report Generation"

      examples:
        - "Analyze Apple stock performance over the last year"
        - "Compare Tesla and Ford stock trends"
        - "Create investment analysis report for Microsoft"
